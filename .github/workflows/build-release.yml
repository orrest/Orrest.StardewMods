name: Build & Release

# Builds the SMAPI mod on every push to master and on version tags.
# On every build the mod zip is uploaded as a CI artifact; on a `v*` tag a
# GitHub Release is created and the zip is attached to it.
#
# The build uses Pathoschild.Stardew.ModBuildConfig, which REQUIRES a Stardew
# Valley install on disk to resolve the game/SMAPI assemblies. The runners have
# none, so we download a copy of the game via DepotDownloader before building.
#
# Required repository secrets:
#   STEAM_USERNAME  - a Steam account that owns Stardew Valley (app 413150)
#   STEAM_PASSWORD  - that account's password
#
# IMPORTANT Steam Guard note: DepotDownloader is non-interactive in CI. The
# simplest reliable option is to use an account with Steam Guard disabled (or
# email Steam Guard that has already trusted this login). Email-guard first
# logins will block the build because there's no way to enter the code.
on:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Download a copy of Stardew Valley (app 413150, Windows depot 413151)
      # into ./game. ModBuildConfig needs the game's assemblies to build.
      - name: Download Stardew Valley via DepotDownloader
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: |
          set -euo pipefail
          # Use the well-known direct asset URL (avoids the GitHub REST API,
          # which rate-limits and returns JSON that's awkward to parse in CI).
          # Note: the release tag is prefixed with "DepotDownloader_".
          depot_version="2.7.4"
          asset_url="https://github.com/SteamRE/DepotDownloader/releases/download/DepotDownloader_${depot_version}/DepotDownloader-linux-x64.zip"

          curl -fsSL --fail -o depotdownloader.zip "$asset_url"
          unzip -o depotdownloader.zip
          chmod +x DepotDownloader

          ./DepotDownloader \
            -app 413150 -depot 413151 \
            -username "$STEAM_USERNAME" -password "$STEAM_PASSWORD" \
            -remember-password \
            -dir "$GITHUB_WORKSPACE/game"

      # The base game depot doesn't include SMAPI. ModBuildConfig requires
      # StardewModdingAPI.dll + smapi-internal/ in the game folder, so install
      # SMAPI non-interactively. The installer flags are documented in SMAPI's
      # src/SMAPI.Installer/InteractiveInstaller.cs:
      #   --install     install (vs uninstall)
      #   --no-prompt   skip interactive color/menu prompts
      #   --game-path   explicit game folder
      - name: Install SMAPI into game folder
        run: |
          set -euo pipefail
          smapi_version="4.5.2"
          installer_url="https://github.com/Pathoschild/SMAPI/releases/download/${smapi_version}/SMAPI-${smapi_version}-installer.zip"

          curl -fsSL --fail -o smapi-installer.zip "$installer_url"
          mkdir -p smapi-installer
          unzip -o -q smapi-installer.zip -d smapi-installer

          # Run the Linux installer non-interactively into the game folder.
          # The top-level extracted dir contains a space ("SMAPI x.y.z installer").
          installer_dir="$(find smapi-installer -type d -name internal -print -quit)/linux"
          chmod +x "$installer_dir/SMAPI.Installer"
          "$installer_dir/SMAPI.Installer" \
            --install --no-prompt \
            --game-path "$GITHUB_WORKSPACE/game"

          # Sanity check: ModBuildConfig needs these to exist.
          test -f "$GITHUB_WORKSPACE/game/StardewModdingAPI.dll"
          test -f "$GITHUB_WORKSPACE/game/smapi-internal/SMAPI.Toolkit.CoreInterfaces.dll"

      - name: Build (Release)
        # GamePath points ModBuildConfig at the downloaded game tree.
        # EnableModDeploy=false keeps the build from copying the mod into the
        # downloaded game's Mods folder (we only need the zip).
        run: >-
          dotnet build Orrest.StardewMods.Fishing/Orrest.StardewMods.Fishing.csproj
          -c Release
          -p:GamePath="$GITHUB_WORKSPACE/game"
          -p:EnableModDeploy=false

      # ModBuildConfig produces a zip named "<ManifestName> <Version>.zip" in the
      # Release output directory. Find its path so the next steps can use it.
      - name: Locate release zip
        id: zip
        shell: bash
        run: |
          zip_path="$(find Orrest.StardewMods.Fishing/bin/Release/net6.0 -maxdepth 1 -type f -name 'Orrest.StardewMods.Fishing *.zip' | head -n 1)"
          if [ -z "$zip_path" ]; then
            echo "::error::No release zip was produced by the build."
            exit 1
          fi
          echo "path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$zip_path")" >> "$GITHUB_OUTPUT"
          echo "Found release zip: $zip_path"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    # Only on version tags.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          draft: false
          prerelease: false
