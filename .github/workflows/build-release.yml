name: Build & Release

# Builds every SMAPI mod in this repo on each push to master and on version tags.
# Each mod is built in parallel via a matrix and packaged into its own zip; on a
# `v*` tag all zips are attached to a single GitHub Release.
#
# The build uses Pathoschild.Stardew.ModBuildConfig, which REQUIRES a Stardew
# Valley install on disk to resolve the game/SMAPI assemblies. The runners have
# none, so the `prepare-game` job downloads the game + installs SMAPI once and
# shares it with the per-mod build jobs via the actions cache.
#
# Required repository secrets:
#   STEAM_USERNAME  - a Steam account that owns Stardew Valley (app 413150)
#   STEAM_PASSWORD  - that account's password
#
# IMPORTANT Steam Guard note: DepotDownloader is non-interactive in CI. The
# simplest reliable option is to use an account with Steam Guard disabled (or
# email Steam Guard that has already trusted this login). Email-guard first
# logins will block the build because there's no way to enter the code.
#
# To build a new mod, just add its name to the `mod` matrix list below.
on:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  prepare-game:
    name: Prepare game (download + SMAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download a copy of Stardew Valley (app 413150, depot 413151) into ./game.
      # ModBuildConfig needs the game's assemblies to build.
      - name: Download Stardew Valley via DepotDownloader
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: |
          set -euo pipefail
          # Use the well-known direct asset URL (avoids the GitHub REST API,
          # which rate-limits and returns JSON that's awkward to parse in CI).
          # Note: the release tag is prefixed with "DepotDownloader_".
          depot_version="2.7.4"
          asset_url="https://github.com/SteamRE/DepotDownloader/releases/download/DepotDownloader_${depot_version}/DepotDownloader-linux-x64.zip"

          curl -fsSL --fail -o depotdownloader.zip "$asset_url"
          unzip -o depotdownloader.zip
          chmod +x DepotDownloader

          ./DepotDownloader \
            -app 413150 -depot 413151 \
            -username "$STEAM_USERNAME" -password "$STEAM_PASSWORD" \
            -remember-password \
            -dir "$GITHUB_WORKSPACE/game"

      # The base game depot doesn't include SMAPI. ModBuildConfig requires
      # StardewModdingAPI.dll + smapi-internal/ in the game folder, so install
      # SMAPI non-interactively. The installer flags are documented in SMAPI's
      # src/SMAPI.Installer/InteractiveInstaller.cs:
      #   --install     install (vs uninstall)
      #   --no-prompt   skip interactive color/menu prompts
      #   --game-path   explicit game folder
      - name: Install SMAPI into game folder
        run: |
          set -euo pipefail
          smapi_version="4.5.2"
          installer_url="https://github.com/Pathoschild/SMAPI/releases/download/${smapi_version}/SMAPI-${smapi_version}-installer.zip"

          curl -fsSL --fail -o smapi-installer.zip "$installer_url"
          mkdir -p smapi-installer
          unzip -o -q smapi-installer.zip -d smapi-installer

          # Run the Linux installer non-interactively into the game folder.
          # The top-level extracted dir contains a space ("SMAPI x.y.z installer").
          installer_dir="$(find smapi-installer -type d -name internal -print -quit)/linux"
          chmod +x "$installer_dir/SMAPI.Installer"
          "$installer_dir/SMAPI.Installer" \
            --install --no-prompt \
            --game-path "$GITHUB_WORKSPACE/game"

          # Sanity check: ModBuildConfig needs these to exist.
          test -f "$GITHUB_WORKSPACE/game/StardewModdingAPI.dll"
          test -f "$GITHUB_WORKSPACE/game/smapi-internal/SMAPI.Toolkit.CoreInterfaces.dll"

      # Share the prepared game tree with the per-mod build jobs. The key embeds
      # the SMAPI version so a SMAPI bump automatically invalidates it.
      - name: Cache prepared game folder
        uses: actions/cache/save@v4
        with:
          path: game
          key: stardew-game-smapi-4.5.2-${{ github.run_id }}

  build:
    name: Build ${{ matrix.mod }}
    needs: prepare-game
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mod:
          - Fishing
          - Pokemon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Restore the game tree prepared by `prepare-game`. Falls back to
      # re-downloading it if the cache missed (best-effort, keeps builds green).
      - name: Restore prepared game folder
        id: game-cache
        uses: actions/cache/restore@v4
        with:
          path: game
          key: stardew-game-smapi-4.5.2-${{ github.run_id }}
          fail-on-cache-miss: false

      - name: Re-prepare game folder (cache fallback)
        if: steps.game-cache.outputs.cache-hit != 'true'
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: |
          set -euo pipefail
          depot_version="2.7.4"
          curl -fsSL --fail -o /tmp/dd.zip "https://github.com/SteamRE/DepotDownloader/releases/download/DepotDownloader_${depot_version}/DepotDownloader-linux-x64.zip"
          unzip -o /tmp/dd.zip -d /tmp/dd
          chmod +x /tmp/dd/DepotDownloader
          /tmp/dd/DepotDownloader -app 413150 -depot 413151 \
            -username "$STEAM_USERNAME" -password "$STEAM_PASSWORD" \
            -remember-password -dir "$GITHUB_WORKSPACE/game"

          smapi_version="4.5.2"
          curl -fsSL --fail -o /tmp/smapi.zip "https://github.com/Pathoschild/SMAPI/releases/download/${smapi_version}/SMAPI-${smapi_version}-installer.zip"
          mkdir -p /tmp/smapi && unzip -o -q /tmp/smapi.zip -d /tmp/smapi
          installer_dir="$(find /tmp/smapi -type d -name internal -print -quit)/linux"
          chmod +x "$installer_dir/SMAPI.Installer"
          "$installer_dir/SMAPI.Installer" --install --no-prompt --game-path "$GITHUB_WORKSPACE/game"

      - name: Build (Release)
        # GamePath points ModBuildConfig at the downloaded game tree.
        # EnableModDeploy=false keeps the build from copying the mod into the
        # downloaded game's Mods folder (we only need the zip).
        run: >-
          dotnet build Orrest.StardewMods.${{ matrix.mod }}/Orrest.StardewMods.${{ matrix.mod }}.csproj
          -c Release
          -p:GamePath="$GITHUB_WORKSPACE/game"
          -p:EnableModDeploy=false

      # ModBuildConfig produces a zip named "<ManifestName> <Version>.zip" in the
      # Release output directory. Find its path so the next steps can use it.
      - name: Locate release zip
        id: zip
        shell: bash
        run: |
          zip_path="$(find "Orrest.StardewMods.${{ matrix.mod }}/bin/Release/net6.0" -maxdepth 1 -type f -name 'Orrest.StardewMods.${{ matrix.mod }} *.zip' | head -n 1)"
          if [ -z "$zip_path" ]; then
            echo "::error::No release zip was produced by the build."
            exit 1
          fi
          echo "path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$zip_path")" >> "$GITHUB_OUTPUT"
          echo "Found release zip: $zip_path"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    # Only on version tags. Needs the game prepared and every mod built.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare-game, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          draft: false
          prerelease: false
